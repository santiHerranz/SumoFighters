  <div class="topbar">
    <div class="topbar-side topbar-side-left">
      <button class="topbar-nav-btn" onclick="openLeftNav()">&#9776; <span class="topbar-badge topbar-badge-a">Robot A</span></button>
    </div>

    <div class="topbar-center">
      <div class="topbar-score">Score: <span id="scoreAEl" class="topbar-badge topbar-badge-a"></span> - <span id="scoreBEl" class="topbar-badge topbar-badge-b"></span></div>
      <button class="button bg-green-600 w-20 h-10 rounded-md p-0" id="gamePauseBtn">Pause</button>
      <button class="button bg-gray-700 w-24 h-10 rounded-md p-0 text-white" onclick="openTopbarSettings()">Settings</button>
    </div>

    <div class="topbar-side topbar-side-right">
      <button class="topbar-nav-btn" onclick="openRightNav()"><span class="topbar-badge topbar-badge-b">Robot B</span> &#9776;</button>
    </div>
  </div>

  <div id="topbarSettingsModal" class="topbar-settings-modal" style="display:none;" onclick="if(event.target===this){closeTopbarSettings();}">
    <div class="topbar-settings-card">
      <div class="topbar-settings-header">
        <span>Simulation Settings</span>
        <button class="topbar-settings-close" onclick="closeTopbarSettings()">&times;</button>
      </div>
      <div class="topbar-settings-body">
        <label>Time speed: <span id="masterTimeSpeedVal">12</span></label>
        <input id=slider_masterTimeSpeed title='time' type=range min=1 max=50 value=12 style=width:100%
          oninput=UpdateSettings();>

        <label><input type=checkbox id=input_showrays onchange="UpdateSettings();"> Show Rays</label>
        <label><input type=checkbox id=input_playsounds checked onchange="UpdateSettings();"> Play sounds</label>
      </div>
      <div class="hidden">
        <input type=checkbox id=input_playcollision_sounds checked onchange="UpdateSettings();"> <label for="input_playcollision_sounds"> Play collision sound
        </label>
      </div>
    </div>
  </div>


  <div id="myLeftNav" class="overlay-left">
    <a href="javascript:void(0)" class="closebtn" onclick="closeLeftNav()">&times;</a>
    <div class="overlay-left-content">
      <div class="overlay-titlebar">
        <span class="overlay-title-badge overlay-title-badge-a">ROBOT A</span>
        <span class="overlay-title-subtitle">Control Panel</span>
      </div>
      <div class="overlay-panel-body">
        <details class="overlay-section" open>
          <summary>Status</summary>
          <textarea id="statusAText" rows="7" cols="60" class="text-grey-darkest flex-1 p-2 m-1 text-xs"
            style="width: 100%;"></textarea>
        </details>
        <details class="overlay-section">
          <summary>Strategy</summary>
          <textarea id="strategyAFuncText" rows="20" cols="60" class="text-grey-darkest flex-1 p-2 m-1 text-xs"
            style="width: 100%;"></textarea>
        </details>
        <details class="overlay-section" open>
          <summary>FSM Tuning</summary>
          <div class="fsm-tuning-grid">
            <label>Min ticks in state: <span id="fsmA_minTicksVal">18</span></label>
            <input id="fsmA_minTicks" type="range" min="1" max="80" value="18" step="1" oninput="UpdateSettings();">

            <label>No-progress distance: <span id="fsmA_noProgressDistanceVal">0.25</span></label>
            <input id="fsmA_noProgressDistance" type="range" min="0" max="3" value="0.25" step="0.05" oninput="UpdateSettings();">

            <label>No-progress ticks threshold: <span id="fsmA_noProgressTicksThresholdVal">180</span></label>
            <input id="fsmA_noProgressTicksThreshold" type="range" min="30" max="600" value="180" step="5" oninput="UpdateSettings();">

            <label>Critical border radius factor: <span id="fsmA_criticalBorderRadiusFactorVal">1.8</span></label>
            <input id="fsmA_criticalBorderRadiusFactor" type="range" min="1" max="4" value="1.8" step="0.1" oninput="UpdateSettings();">

            <label>Near-border dojo factor: <span id="fsmA_nearBorderDojoFactorVal">0.45</span></label>
            <input id="fsmA_nearBorderDojoFactor" type="range" min="0.2" max="0.8" value="0.45" step="0.01" oninput="UpdateSettings();">

            <label>Near-border side radius factor: <span id="fsmA_nearBorderSideRadiusFactorVal">2.5</span></label>
            <input id="fsmA_nearBorderSideRadiusFactor" type="range" min="1" max="6" value="2.5" step="0.1" oninput="UpdateSettings();">

            <label>Front-strong radius factor: <span id="fsmA_frontStrongRadiusFactorVal">3.0</span></label>
            <input id="fsmA_frontStrongRadiusFactor" type="range" min="1" max="6" value="3" step="0.1" oninput="UpdateSettings();">

            <label>Front-strong minimum hits: <span id="fsmA_frontStrongMinHitsVal">2</span></label>
            <input id="fsmA_frontStrongMinHits" type="range" min="1" max="6" value="2" step="1" oninput="UpdateSettings();">

            <label>High-energy threshold: <span id="fsmA_highEnergyThresholdVal">70</span></label>
            <input id="fsmA_highEnergyThreshold" type="range" min="30" max="100" value="70" step="1" oninput="UpdateSettings();">

            <label>Low-energy threshold: <span id="fsmA_lowEnergyThresholdVal">30</span></label>
            <input id="fsmA_lowEnergyThreshold" type="range" min="0" max="70" value="30" step="1" oninput="UpdateSettings();">

            <label>Contact attack-energy threshold: <span id="fsmA_contactAttackEnergyThresholdVal">35</span></label>
            <input id="fsmA_contactAttackEnergyThreshold" type="range" min="10" max="80" value="35" step="1" oninput="UpdateSettings();">
          </div>
        </details>
      </div>
    </div>
  </div>

  <div id="myRightNav" class="overlay-right">

    <div class="overlay-right-content">

        <details class="overlay-section" open>

  <script>
    function openLeftNav() {
      document.getElementById("myLeftNav").style.width = "20%";
    }

    function closeLeftNav() {
      document.getElementById("myLeftNav").style.width = "0%";
    }

    function openRightNav() {
      document.getElementById("myRightNav").style.width = "20%";
      document.getElementById("myRightNav").style.right = "0px";
    }

    function closeRightNav() {
      document.getElementById("myRightNav").style.width = "0%";
    }

    function openTopbarSettings() {
      document.getElementById("topbarSettingsModal").style.display = "flex";
    }

    function closeTopbarSettings() {
      document.getElementById("topbarSettingsModal").style.display = "none";
    }
  </script>

  <script>
    function readRobotFsmConfig(prefix) {
      return {
        minTicksInState: Number(document.getElementById(`fsm${prefix}_minTicks`).value),
        noProgressDistance: Number(document.getElementById(`fsm${prefix}_noProgressDistance`).value),
        noProgressTicksThreshold: Number(document.getElementById(`fsm${prefix}_noProgressTicksThreshold`).value),
        criticalBorderRadiusFactor: Number(document.getElementById(`fsm${prefix}_criticalBorderRadiusFactor`).value),
        nearBorderDojoFactor: Number(document.getElementById(`fsm${prefix}_nearBorderDojoFactor`).value),
        nearBorderSideRadiusFactor: Number(document.getElementById(`fsm${prefix}_nearBorderSideRadiusFactor`).value),
        frontStrongRadiusFactor: Number(document.getElementById(`fsm${prefix}_frontStrongRadiusFactor`).value),
        frontStrongMinHits: Number(document.getElementById(`fsm${prefix}_frontStrongMinHits`).value),
        highEnergyThreshold: Number(document.getElementById(`fsm${prefix}_highEnergyThreshold`).value),
        lowEnergyThreshold: Number(document.getElementById(`fsm${prefix}_lowEnergyThreshold`).value),
        contactAttackEnergyThreshold: Number(document.getElementById(`fsm${prefix}_contactAttackEnergyThreshold`).value)
      };
    }

    function renderRobotFsmConfig(prefix, config) {
      document.getElementById(`fsm${prefix}_minTicksVal`).textContent = config.minTicksInState;
      document.getElementById(`fsm${prefix}_noProgressDistanceVal`).textContent = config.noProgressDistance.toFixed(2);
      document.getElementById(`fsm${prefix}_noProgressTicksThresholdVal`).textContent = config.noProgressTicksThreshold;
      document.getElementById(`fsm${prefix}_criticalBorderRadiusFactorVal`).textContent = config.criticalBorderRadiusFactor.toFixed(1);
      document.getElementById(`fsm${prefix}_nearBorderDojoFactorVal`).textContent = config.nearBorderDojoFactor.toFixed(2);
      document.getElementById(`fsm${prefix}_nearBorderSideRadiusFactorVal`).textContent = config.nearBorderSideRadiusFactor.toFixed(1);
      document.getElementById(`fsm${prefix}_frontStrongRadiusFactorVal`).textContent = config.frontStrongRadiusFactor.toFixed(1);
      document.getElementById(`fsm${prefix}_frontStrongMinHitsVal`).textContent = config.frontStrongMinHits;
      document.getElementById(`fsm${prefix}_highEnergyThresholdVal`).textContent = config.highEnergyThreshold;
      document.getElementById(`fsm${prefix}_lowEnergyThresholdVal`).textContent = config.lowEnergyThreshold;
      document.getElementById(`fsm${prefix}_contactAttackEnergyThresholdVal`).textContent = config.contactAttackEnergyThreshold;
    }

    function UpdateSettings() {
      const v = slider_masterTimeSpeed.value;
      deltaTime = v / 100;
      masterTimeSpeedVal.textContent = v;

      showRays = input_showrays.checked;
      
      playSounds = input_playsounds.checked;
      input_playcollision_sounds.disabled = !input_playsounds.checked;
      playCollisionSound = input_playcollision_sounds.checked && !input_playcollision_sounds.disabled;

      if (typeof fsmTuningConfigs === "undefined" || fsmTuningConfigs == null) {
        window.fsmTuningConfigs = {
          A: {},
          B: {}
        };
      }

      fsmTuningConfigs.A = readRobotFsmConfig("A");
      fsmTuningConfigs.B = readRobotFsmConfig("B");
      renderRobotFsmConfig("A", fsmTuningConfigs.A);
      renderRobotFsmConfig("B", fsmTuningConfigs.B);

    }
  </script>
